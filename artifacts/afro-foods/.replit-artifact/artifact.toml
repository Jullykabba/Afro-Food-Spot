kind = "web"
previewPath = "/"
title = "Afro Foods Restaurant"
version = "1.0.0"
id = "artifacts/afro-foods"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22759

[services.development]
run = "pnpm --filter @workspace/afro-foods run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/afro-foods", "run", "build" ]
publicDir = "artifacts/afro-foods/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22759"
BASE_PATH = "/"
